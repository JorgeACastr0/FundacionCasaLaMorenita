# ══════════════════════════════════════════════════════════════
# Nginx — Fundación Hogar La Morenita
# Ubicación en el CT: /etc/nginx/sites-available/lamorenita
# ══════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name tudominio.com www.tudominio.com;
    # Certbot redirigirá esto a HTTPS automáticamente
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name tudominio.com www.tudominio.com;

    # ── SSL (Certbot los genera) ───────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/tudominio.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tudominio.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ── Raíz del sitio ─────────────────────────────────────────
    root  /var/www/lamorenita/public;
    index index.html;

    # ── Compresión ─────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types        text/plain text/css text/javascript application/javascript
                      application/json image/svg+xml;

    # ── Cache — assets con hash en nombre → 1 año ─────────────
    location ~* \.(css|js|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Cache — imágenes ──────────────────────────────────────
    location ~* \.(webp|jpg|jpeg|png|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Archivos subidos ──────────────────────────────────────
    location /uploads/ {
        alias /var/www/lamorenita/public/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        # Seguridad: no ejecutar scripts en uploads
        location ~* \.(php|py|sh|pl)$ { deny all; }
    }

    # ── Cache del feed social (archivo JSON estático) ─────────
    location /cache/social_feed.json {
        expires 10m;
        add_header Cache-Control "public";
    }

    # ── API → Node.js ─────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_cache_bypass $http_upgrade;

        # Límite de tamaño para uploads (fotos)
        client_max_body_size 10M;
    }

    # ── Admin — solo permite acceso por IP si se desea ────────
    # location /admin/ {
    #     allow 1.2.3.4;  # tu IP
    #     deny  all;
    # }

    # ── SPA fallback — sirve index.html para rutas no encontradas
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Seguridad ─────────────────────────────────────────────
    add_header X-Frame-Options          "SAMEORIGIN";
    add_header X-Content-Type-Options   "nosniff";
    add_header X-XSS-Protection         "1; mode=block";
    add_header Referrer-Policy          "strict-origin-when-cross-origin";
}
