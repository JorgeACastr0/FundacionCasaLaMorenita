# ══════════════════════════════════════════════════════════════════
#  Nginx — configuración Docker
#  HTTP:80 solamente — Cloudflare termina SSL en el edge
# ══════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;

    # ── Raíz del sitio estático ────────────────────────────────
    root  /var/www/html;
    index index.html;

    # ── Compresión ─────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types        text/plain text/css text/javascript application/javascript
                      application/json image/svg+xml;

    # ── Cache — assets estáticos ───────────────────────────────
    location ~* \.(css|js|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Cache — imágenes ──────────────────────────────────────
    location ~* \.(webp|jpg|jpeg|png|gif|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Archivos subidos (bind mount desde host) ───────────────
    location /uploads/ {
        alias /var/www/html/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        # No ejecutar scripts en uploads
        location ~* \.(php|py|sh|pl)$ { deny all; }
    }

    # ── Feed social en caché ───────────────────────────────────
    location /cache/ {
        alias /var/www/html/cache/;
        expires 10m;
        add_header Cache-Control "public";
    }

    # ── API → contenedor Node.js ───────────────────────────────
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_cache_bypass $http_upgrade;

        # Tamaño máximo para subida de fotos
        client_max_body_size 10M;
    }

    # ── Fallback para navegación ───────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cabeceras de seguridad ─────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection       "1; mode=block";
    add_header Referrer-Policy        "strict-origin-when-cross-origin";
}
